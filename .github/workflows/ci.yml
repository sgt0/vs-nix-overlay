name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '00 8 * * *'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.number || github.ref }}
  cancel-in-progress: ${{ github.ref_name != 'main' }}

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, ubuntu-24.04-arm, macos-15, macos-15-intel]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Set up Nix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: vs-nix-overlay
          extraPullNames: devenv,sgt0
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Build Nix packages
        run: |
          system=$(nix eval --impure --raw --expr 'builtins.currentSystem')
          nix build --print-build-logs --keep-going \
            $(nix eval ".#ciPackages.${system}" --apply \
              'ps: toString (map (k: ".#ciPackages.'"${system}"'.${k}") (builtins.attrNames ps))' \
              --raw)

      - run: nix flake check --impure --keep-going --print-build-logs
        env:
          NIXPKGS_ALLOW_BROKEN: 1
          NIXPKGS_ALLOW_UNFREE: 1
          NIXPKGS_ALLOW_UNSUPPORTED_SYSTEM: 1

      - run: nix flake show

  examples-simple-flake:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-24.04, macos-15, macos-15-intel]
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: ./examples/simple-flake
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install nix
        uses: cachix/install-nix-action@8aa03977d8d733052d78f4e008a241fd1dbf36b3 # v31.10.6

      - name: Set up Nix cache
        uses: cachix/cachix-action@5f2d7c5294214f71b873db4b969586b980625e71 # v17
        with:
          name: vs-nix-overlay
          extraPullNames: devenv,sgt0
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}

      - name: Test
        run: nix develop -c uv run python -c "import vapoursynth; print(vapoursynth.core); print(vapoursynth.core.vszip);"
